<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'unsafe-inline' 'unsafe-eval'; style-src 'unsafe-inline' 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;"
    />
    <!-- Favicon and App Icons -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../../../docs/assets/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../../../docs/assets/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../../../docs/assets/favicon-16x16.png"
    />
    <link rel="manifest" href="../../../docs/assets/site.webmanifest" />
    <link rel="shortcut icon" href="../../../docs/assets/favicon.ico" />
    <title>EaseMotion CSS — Documentation (Sidebar Animations Link Demo)</title>
    <meta
      name="description"
      content="Official documentation for EaseMotion CSS — the animation-first, human-readable CSS framework."
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Link to external docs.css -->
    <link rel="stylesheet" href="../../../docs/docs.css" />

    <!-- Link to local style.css -->
    <link rel="stylesheet" href="style.css" />

    <!-- Apply stored theme before first paint to avoid flash -->
    <script>
      (function () {
        var t = localStorage.getItem("em-theme") || "dark";
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
  </head>

  <body>
    <div class="ease-scroll-progress"></div>
